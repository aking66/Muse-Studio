name: Security Dependency Guard

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run supply-chain guard
        run: python scripts/security_dependency_guard.py
